name: NPM Audit Fix Run
on:
  # checkov:skip=CKV_GHA_7 The workflow requires user input for manual triggering
  workflow_dispatch:
    inputs:
      force:
        description: 'Use --force flag for npm audit fix?'
        required: true
        type: boolean
      base_branch:
        description: 'Specify a base branch'
        required: false
        default: 'main'
      script:
        description: 'Specify script to execute'
        required: false
        default: 'npm run all'
      node_version:
        description: "Specify Node.js version (e.g., '18', '20', 'lts/*')"
        required: false
        default: '24'
  schedule:
    - cron: '0 0 * * 1'

jobs:
  audit-fix:
    uses: step-security/reusable-workflows/.github/workflows/audit_fix.yml@v1
    with:
      force: ${{ inputs.force || false }}
      base_branch: ${{ inputs.base_branch || 'main' }}
      script: ${{ github.event.inputs.script || 'npm run all' }}
      node_version: "${{ inputs.node_version || '24' }}"

permissions:
  contents: write
  pull-requests: write
  packages: read
  issues: write
